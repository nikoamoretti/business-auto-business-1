services:
  - type: web
    name: saasify-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saasify-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://saasify.vercel.app"
      - key: APP_ENV
        value: "production"

databases:
  - name: saasify-db
    plan: free
    databaseName: saasify
    user: saasify
